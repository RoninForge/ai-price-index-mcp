name: Release

# Publish to npm with provenance when a v* tag is pushed, authenticated via npm Trusted Publishing
# (GitHub OIDC, no stored token). The tag must match package.json. Tests run first, so a release never
# ships red.
#
# One-time setup before the first tagged release (see RELEASING.md): configure a Trusted Publisher for
# the ai-price-index-mcp package on npmjs.com, pointing at this repo (RoninForge/ai-price-index-mcp) and
# this workflow file (release.yml). No NPM_TOKEN secret is needed.
#
# Security note: uses only GitHub-provided env (GITHUB_REF_NAME) and OIDC. No untrusted event input is
# interpolated into a run step, so there is no injection surface.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # npm Trusted Publishing (OIDC) authentication + provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      # Trusted Publishing (OIDC) requires npm >= 11.5.1; node 22 bundles an older npm.
      - run: npm install -g npm@latest

      - run: npm ci
      - run: npm test

      - name: Verify the tag matches package.json version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "package.json=$PKG_VERSION tag=$TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION. Aborting."
            exit 1
          fi

      - name: Publish to npm (Trusted Publishing + provenance)
        run: npm publish --provenance --access public
